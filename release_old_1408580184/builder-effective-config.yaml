directories:
  output: release
  buildResources: build
appId: com.acatechnologies.docgen
productName: DocGen
asar: true
files:
  - filter:
      - electron/**/*
      - frontend/dist/**/*
      - package.json
extraResources:
  - from: resources/backend
    to: backend
  - from: resources/ollama
    to: ollama
  - from: resources/tesseract
    to: tesseract
  - from: resources/poppler
    to: poppler
  - from: resources/gtk3-runtime
    to: gtk3-runtime
win:
  target: dir
electronVersion: 42.5.0
